<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    :root,
    [data-theme="dark"] {
      --bg-gradient-start: #1a1a2e;
      --bg-gradient-end: #16213e;
      --calc-bg: #0f3460;
      --calc-shadow: rgba(0, 0, 0, 0.4);
      --display-bg: #1a1a2e;
      --display-text: #e8e8e8;
      --btn-bg: #533483;
      --btn-hover: #6b44a8;
      --toggle-bg: #1a1a2e;
      --toggle-text: #e8e8e8;
      --history-bg: #1a1a2e;
      --history-text: #b8b8b8;
      --history-result: #e8e8e8;
      --history-border: rgba(255, 255, 255, 0.08);
      --history-hover: rgba(255, 255, 255, 0.06);
    }

    [data-theme="light"] {
      --bg-gradient-start: #e8eef5;
      --bg-gradient-end: #d4dce8;
      --calc-bg: #ffffff;
      --calc-shadow: rgba(0, 0, 0, 0.12);
      --display-bg: #f0f4f8;
      --display-text: #1a1a2e;
      --btn-bg: #7c6ba8;
      --btn-hover: #6a5896;
      --toggle-bg: #f0f4f8;
      --toggle-text: #1a1a2e;
      --history-bg: #f0f4f8;
      --history-text: #5a6270;
      --history-result: #1a1a2e;
      --history-border: rgba(0, 0, 0, 0.08);
      --history-hover: rgba(0, 0, 0, 0.04);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      transition: background 0.3s;
      padding: 20px;
    }

    .app {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .calculator {
      background: var(--calc-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px var(--calc-shadow);
      width: 320px;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .theme-toggle {
      font-size: 1.25rem;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--toggle-bg);
      color: var(--toggle-text);
      transition: background 0.3s, transform 0.1s;
    }

    .theme-toggle:hover {
      opacity: 0.85;
    }

    .theme-toggle:active {
      transform: scale(0.96);
    }

    .display {
      background: var(--display-bg);
      color: var(--display-text);
      font-size: 2rem;
      text-align: right;
      padding: 16px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 56px;
      word-break: break-all;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-size: 1.25rem;
      padding: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--btn-bg);
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: var(--btn-hover);
    }

    button:active {
      transform: scale(0.96);
    }

    button.operator {
      background: #e94560;
    }

    button.operator:hover {
      background: #ff6b6b;
    }

    button.clear {
      background: #c0392b;
      color: #fff;
      font-weight: 600;
    }

    button.clear:hover {
      background: #e74c3c;
    }

    button.equals {
      background: #27ae60;
      grid-column: span 2;
    }

    button.equals:hover {
      background: #2ecc71;
    }

    button.function {
      background: #2980b9;
      font-size: 1.1rem;
    }

    button.function:hover {
      background: #3498db;
    }

    .history-panel {
      background: var(--calc-bg);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px var(--calc-shadow);
      width: 280px;
      max-height: 520px;
      display: flex;
      flex-direction: column;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--display-text);
    }

    .history-clear {
      font-size: 0.75rem;
      padding: 6px 10px;
      background: var(--history-bg);
      color: var(--history-text);
    }

    .history-clear:hover {
      background: var(--history-hover);
      color: var(--display-text);
    }

    .history-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-list:empty::after {
      content: "Пока нет операций";
      color: var(--history-text);
      font-size: 0.875rem;
      text-align: center;
      padding: 24px 8px;
    }

    .history-item {
      background: var(--history-bg);
      border: 1px solid var(--history-border);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-item:hover {
      background: var(--history-hover);
    }

    .history-expression {
      font-size: 0.8rem;
      color: var(--history-text);
      margin-bottom: 4px;
      word-break: break-all;
    }

    .history-result {
      font-size: 1rem;
      font-weight: 600;
      color: var(--history-result);
      text-align: right;
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
  <div class="calculator">
    <div class="header">
      <button type="button" class="theme-toggle" id="themeToggle" title="Сменить тему">☀️</button>
    </div>
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button type="button" class="clear" data-action="clear">C</button>
      <button type="button" class="function" data-action="sqrt">√</button>
      <button type="button" class="function" data-action="square">x²</button>
      <button type="button" class="operator" data-action="divide">÷</button>

      <button type="button" data-digit="7">7</button>
      <button type="button" data-digit="8">8</button>
      <button type="button" data-digit="9">9</button>
      <button type="button" class="operator" data-action="multiply">×</button>

      <button type="button" data-digit="4">4</button>
      <button type="button" data-digit="5">5</button>
      <button type="button" data-digit="6">6</button>
      <button type="button" class="operator" data-action="subtract">−</button>

      <button type="button" data-digit="1">1</button>
      <button type="button" data-digit="2">2</button>
      <button type="button" data-digit="3">3</button>
      <button type="button" class="operator" data-action="add">+</button>

      <button type="button" data-digit="0">0</button>
      <button type="button" data-action="decimal">.</button>
      <button type="button" class="equals" data-action="equals">=</button>
    </div>
  </div>

  <aside class="history-panel">
    <div class="history-header">
      <h2>Журнал операций</h2>
      <button type="button" class="history-clear" id="historyClear">Очистить</button>
    </div>
    <ul class="history-list" id="historyList"></ul>
  </aside>
  </div>

  <script>
    const display = document.getElementById("display");
    const themeToggle = document.getElementById("themeToggle");
    const historyList = document.getElementById("historyList");
    const historyClear = document.getElementById("historyClear");
    const THEME_KEY = "calculator-theme";
    const HISTORY_KEY = "calculator-history";
    const MAX_HISTORY = 50;

    const operatorSymbols = {
      add: "+",
      subtract: "−",
      multiply: "×",
      divide: "÷",
    };

    let history = [];

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
      themeToggle.title = theme === "dark" ? "Светлая тема" : "Тёмная тема";
      localStorage.setItem(THEME_KEY, theme);
    }

    function toggleTheme() {
      const next = document.body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(next);
    }

    applyTheme(localStorage.getItem(THEME_KEY) || "dark");
    themeToggle.addEventListener("click", toggleTheme);

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(localStorage.getItem(HISTORY_KEY));
        history = Array.isArray(saved) ? saved : [];
      } catch {
        history = [];
      }
      renderHistory();
    }

    function addHistoryEntry(expression, result) {
      history.unshift({ expression, result, time: Date.now() });
      if (history.length > MAX_HISTORY) {
        history.length = MAX_HISTORY;
      }
      saveHistory();
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";
      history.forEach((entry, index) => {
        const li = document.createElement("li");
        li.className = "history-item";
        li.innerHTML =
          `<div class="history-expression">${entry.expression}</div>` +
          `<div class="history-result">= ${entry.result}</div>`;
        li.addEventListener("click", () => {
          currentValue = entry.result;
          shouldResetDisplay = true;
          updateDisplay(currentValue);
        });
        historyList.appendChild(li);
      });
    }

    function clearHistory() {
      history = [];
      saveHistory();
      renderHistory();
    }

    historyClear.addEventListener("click", clearHistory);
    loadHistory();


    let currentValue = "0";
    let previousValue = null;
    let operator = null;
    let shouldResetDisplay = false;

    function updateDisplay(text) {
      display.textContent = text;
    }

    function getCurrentNumber() {
      return parseFloat(currentValue);
    }

    function formatResult(num) {
      if (!Number.isFinite(num)) return "Ошибка";
      const rounded = Math.round(num * 1e10) / 1e10;
      return String(rounded);
    }

    function clear() {
      currentValue = "0";
      previousValue = null;
      operator = null;
      shouldResetDisplay = false;
      updateDisplay("0");
    }

    function appendDigit(digit) {
      if (shouldResetDisplay) {
        currentValue = digit;
        shouldResetDisplay = false;
      } else if (currentValue === "0" && digit !== ".") {
        currentValue = digit;
      } else if (digit === "." && currentValue.includes(".")) {
        return;
      } else {
        currentValue += digit;
      }
      updateDisplay(currentValue);
    }

    function setOperator(op) {
      if (operator !== null && !shouldResetDisplay) {
        calculate();
      }
      previousValue = getCurrentNumber();
      operator = op;
      shouldResetDisplay = true;
    }

    function calculate() {
      if (operator === null || previousValue === null) return;

      const a = previousValue;
      const b = getCurrentNumber();
      let result;

      switch (operator) {
        case "add":
          result = a + b;
          break;
        case "subtract":
          result = a - b;
          break;
        case "multiply":
          result = a * b;
          break;
        case "divide":
          if (b === 0) {
            addHistoryEntry(`${a} ÷ ${b}`, "Ошибка");
            updateDisplay("Ошибка");
            clear();
            return;
          }
          result = a / b;
          break;
        default:
          return;
      }

      currentValue = formatResult(result);
      const symbol = operatorSymbols[operator];
      addHistoryEntry(`${a} ${symbol} ${b}`, currentValue);
      operator = null;
      previousValue = null;
      shouldResetDisplay = true;
      updateDisplay(currentValue);
    }

    function squareRoot() {
      const n = getCurrentNumber();
      if (n < 0) {
        addHistoryEntry(`√(${n})`, "Ошибка");
        updateDisplay("Ошибка");
        shouldResetDisplay = true;
        return;
      }
      currentValue = formatResult(Math.sqrt(n));
      addHistoryEntry(`√(${n})`, currentValue);
      shouldResetDisplay = true;
      updateDisplay(currentValue);
    }

    function square() {
      const n = getCurrentNumber();
      currentValue = formatResult(n * n);
      addHistoryEntry(`${n}²`, currentValue);
      shouldResetDisplay = true;
      updateDisplay(currentValue);
    }

    document.querySelector(".buttons").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const digit = btn.dataset.digit;
      const action = btn.dataset.action;

      if (digit !== undefined) {
        appendDigit(digit);
        return;
      }

      switch (action) {
        case "clear":
          clear();
          break;
        case "decimal":
          appendDigit(".");
          break;
        case "sqrt":
          squareRoot();
          break;
        case "square":
          square();
          break;
        case "add":
        case "subtract":
        case "multiply":
        case "divide":
          setOperator(action);
          break;
        case "equals":
          calculate();
          break;
      }
    });
  </script>
</body>
</html>
