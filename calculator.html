<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
    }

    .calculator {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      width: 320px;
    }

    .display {
      background: #1a1a2e;
      color: #e8e8e8;
      font-size: 2rem;
      text-align: right;
      padding: 16px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      min-height: 56px;
      word-break: break-all;
      overflow: hidden;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      font-size: 1.25rem;
      padding: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #533483;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: #6b44a8;
    }

    button:active {
      transform: scale(0.96);
    }

    button.operator {
      background: #e94560;
    }

    button.operator:hover {
      background: #ff6b6b;
    }

    button.clear {
      background: #c0392b;
      color: #fff;
      font-weight: 600;
    }

    button.clear:hover {
      background: #e74c3c;
    }

    button.equals {
      background: #27ae60;
      grid-column: span 2;
    }

    button.equals:hover {
      background: #2ecc71;
    }

    button.function {
      background: #2980b9;
      font-size: 1.1rem;
    }

    button.function:hover {
      background: #3498db;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button type="button" class="clear" data-action="clear">C</button>
      <button type="button" class="function" data-action="sqrt">√</button>
      <button type="button" class="function" data-action="square">x²</button>
      <button type="button" class="operator" data-action="divide">÷</button>

      <button type="button" data-digit="7">7</button>
      <button type="button" data-digit="8">8</button>
      <button type="button" data-digit="9">9</button>
      <button type="button" class="operator" data-action="multiply">×</button>

      <button type="button" data-digit="4">4</button>
      <button type="button" data-digit="5">5</button>
      <button type="button" data-digit="6">6</button>
      <button type="button" class="operator" data-action="subtract">−</button>

      <button type="button" data-digit="1">1</button>
      <button type="button" data-digit="2">2</button>
      <button type="button" data-digit="3">3</button>
      <button type="button" class="operator" data-action="add">+</button>

      <button type="button" data-digit="0">0</button>
      <button type="button" data-action="decimal">.</button>
      <button type="button" class="equals" data-action="equals">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    let currentValue = "0";
    let previousValue = null;
    let operator = null;
    let shouldResetDisplay = false;

    function updateDisplay(text) {
      display.textContent = text;
    }

    function getCurrentNumber() {
      return parseFloat(currentValue);
    }

    function formatResult(num) {
      if (!Number.isFinite(num)) return "Ошибка";
      const rounded = Math.round(num * 1e10) / 1e10;
      return String(rounded);
    }

    function clear() {
      currentValue = "0";
      previousValue = null;
      operator = null;
      shouldResetDisplay = false;
      updateDisplay("0");
    }

    function appendDigit(digit) {
      if (shouldResetDisplay) {
        currentValue = digit;
        shouldResetDisplay = false;
      } else if (currentValue === "0" && digit !== ".") {
        currentValue = digit;
      } else if (digit === "." && currentValue.includes(".")) {
        return;
      } else {
        currentValue += digit;
      }
      updateDisplay(currentValue);
    }

    function setOperator(op) {
      if (operator !== null && !shouldResetDisplay) {
        calculate();
      }
      previousValue = getCurrentNumber();
      operator = op;
      shouldResetDisplay = true;
    }

    function calculate() {
      if (operator === null || previousValue === null) return;

      const a = previousValue;
      const b = getCurrentNumber();
      let result;

      switch (operator) {
        case "add":
          result = a + b;
          break;
        case "subtract":
          result = a - b;
          break;
        case "multiply":
          result = a * b;
          break;
        case "divide":
          if (b === 0) {
            updateDisplay("Ошибка");
            clear();
            return;
          }
          result = a / b;
          break;
        default:
          return;
      }

      currentValue = formatResult(result);
      operator = null;
      previousValue = null;
      shouldResetDisplay = true;
      updateDisplay(currentValue);
    }

    function squareRoot() {
      const n = getCurrentNumber();
      if (n < 0) {
        updateDisplay("Ошибка");
        shouldResetDisplay = true;
        return;
      }
      currentValue = formatResult(Math.sqrt(n));
      shouldResetDisplay = true;
      updateDisplay(currentValue);
    }

    function square() {
      const n = getCurrentNumber();
      currentValue = formatResult(n * n);
      shouldResetDisplay = true;
      updateDisplay(currentValue);
    }

    document.querySelector(".buttons").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;

      const digit = btn.dataset.digit;
      const action = btn.dataset.action;

      if (digit !== undefined) {
        appendDigit(digit);
        return;
      }

      switch (action) {
        case "clear":
          clear();
          break;
        case "decimal":
          appendDigit(".");
          break;
        case "sqrt":
          squareRoot();
          break;
        case "square":
          square();
          break;
        case "add":
        case "subtract":
        case "multiply":
        case "divide":
          setOperator(action);
          break;
        case "equals":
          calculate();
          break;
      }
    });
  </script>
</body>
</html>
